<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' blob: data:;
                   media-src 'self' blob: mediastream: data:;
                   script-src 'self' 'unsafe-inline';
                   style-src 'self' 'unsafe-inline';
                   connect-src 'self' https:;">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeetSpace Media Host</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            -webkit-font-smoothing: antialiased;
        }

        #media-grid {
            position: relative;
            width: 100%; height: 100%;
            padding: 6px;
            display: grid;
            gap: 6px;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        /* Adaptive grid: 2 tiles = 2 cols, 3-4 = 2x2, 5-9 = 3 cols, 10+ = 4 cols */
        #media-grid[data-tile-count='2'] { grid-template-columns: 1fr 1fr; }
        #media-grid[data-tile-count='3'],
        #media-grid[data-tile-count='4'] { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        #media-grid[data-tile-count='5'],
        #media-grid[data-tile-count='6'],
        #media-grid[data-tile-count='7'],
        #media-grid[data-tile-count='8'],
        #media-grid[data-tile-count='9'] { grid-template-columns: repeat(3, 1fr); }

        #media-grid:fullscreen { padding: 10px; gap: 8px; background: #0d0d1a; }

        /* Stage/strip for focused (speaker) view */
        .media-stage {
            display: none;
            position: absolute;
            inset: 6px;
            border-radius: 12px;
            overflow: hidden;
            background: #0d0d1a;
            z-index: 1;
        }

        .media-strip {
            display: contents;
        }
        .media-strip:empty { display: none; }

        #media-grid[data-has-focus='true'] {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }
        #media-grid[data-has-focus='true'] .media-stage {
            display: flex;
            position: relative;
            inset: unset;
            min-height: 0;
            width: 100%;
            height: 100%;
        }
        #media-grid[data-has-focus='true'] .media-strip {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 10px;
            z-index: 4;
            display: flex;
            gap: 8px;
            max-height: min(24vh, 180px);
            overflow-x: auto;
            overflow-y: hidden;
            padding: 6px;
            border-radius: 12px;
            background: rgba(13, 13, 26, 0.78);
            backdrop-filter: blur(12px);
        }
        #media-grid[data-has-focus='true'] .media-strip .media-tile {
            min-width: 200px;
            max-width: 280px;
            flex-shrink: 0;
        }
        #media-grid:fullscreen[data-has-focus='true'] .media-strip {
            left: 14px;
            right: 14px;
            bottom: 14px;
            max-height: min(26vh, 220px);
        }

        .media-stage .media-tile {
            width: 100%; height: 100%;
            border-radius: 0;
            border: none;
        }

        /* Tile */
        .media-tile {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background: #16162d;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease, opacity 0.3s ease;
            animation: tileEnter 0.3s ease-out;
        }
        @keyframes tileEnter {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .media-tile:hover {
            border-color: rgba(88, 166, 255, 0.3);
        }
        .media-tile--focused {
            border-color: rgba(88, 166, 255, 0.7);
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.25), 0 4px 24px rgba(0,0,0,0.4);
        }
        .media-tile--speaking {
            border-color: #4ade80;
            box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.3), 0 0 16px rgba(74, 222, 128, 0.15);
        }

        /* Video */
        .media-video {
            width: 100%; height: 100%;
            object-fit: cover;
            background: #0d0d1a;
            display: block;
        }
        .media-stage .media-video { object-fit: contain; }
        .media-tile[data-track-type='screen'] .media-video { object-fit: contain; }
        .media-tile[data-scope='local'] .media-video { transform: scaleX(-1); }
        .media-tile[data-track-type='screen'][data-scope='local'] .media-video { transform: none; }

        /* Label */
        .media-tile-label {
            position: absolute;
            left: 8px; bottom: 8px;
            max-width: calc(100% - 16px);
            padding: 4px 10px;
            border-radius: 6px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }

        /* Connection quality indicator */
        .media-tile-quality {
            position: absolute;
            top: 8px; right: 8px;
            display: flex;
            gap: 2px;
            align-items: flex-end;
            z-index: 2;
        }
        .media-tile-quality .bar {
            width: 3px;
            border-radius: 1px;
            background: rgba(255,255,255,0.25);
            transition: height 0.3s ease, background 0.3s ease;
        }
        .media-tile-quality .bar.active { background: #4ade80; }
        .media-tile-quality .bar.warn { background: #facc15; }
        .media-tile-quality .bar.poor { background: #f87171; }
        .media-tile-quality .bar:nth-child(1) { height: 4px; }
        .media-tile-quality .bar:nth-child(2) { height: 7px; }
        .media-tile-quality .bar:nth-child(3) { height: 10px; }
        .media-tile-quality .bar:nth-child(4) { height: 13px; }

        /* No participants placeholder */
        #media-grid:empty::after {
            content: 'Ожидание участников…';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.35);
            font-size: 16px;
            font-weight: 400;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="media-grid"></div>
    <script src="bridge.bundle.js"></script>
</body>
</html>
