<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' blob: data:;
                   media-src 'self' blob: mediastream: data:;
                   script-src 'self' 'unsafe-inline';
                   style-src 'self' 'unsafe-inline';
                   connect-src 'self' https:;">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeetSpace Media Host</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        #media-grid {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 8px;
            display: block;
        }

        #media-grid:fullscreen {
            padding: 12px;
            background: #000;
        }

        .media-stage {
            display: none;
            position: absolute;
            inset: 8px;
            border-radius: 8px;
            overflow: hidden;
            background: #020406;
        }

        .media-strip {
            position: absolute;
            inset: 8px;
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            grid-auto-rows: minmax(160px, 1fr);
            align-content: stretch;
        }

        .media-strip:empty {
            display: none;
        }

        #media-grid[data-has-focus='true'] .media-stage {
            display: block;
        }

        #media-grid[data-has-focus='true'] .media-strip {
            inset: auto 16px 16px 16px;
            max-height: 28%;
            padding: 8px;
            border-radius: 10px;
            background: rgba(2, 6, 12, 0.72);
            backdrop-filter: blur(4px);
            overflow-y: auto;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            grid-auto-rows: minmax(120px, 1fr);
        }

        #media-grid:fullscreen[data-has-focus='true'] .media-strip {
            inset: auto 20px 20px 20px;
            max-height: 24%;
        }

        .media-stage .media-tile {
            width: 100%;
            height: 100%;
            border-radius: 0;
            border: none;
        }

        .media-tile {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: #06090f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        .media-tile--focused {
            border-color: rgba(88, 166, 255, 0.65);
            box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.35);
        }

        .media-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        .media-stage .media-video {
            object-fit: contain;
            background: #000;
        }

        .media-tile[data-track-type='screen'] .media-video {
            object-fit: contain;
        }

        .media-tile-label {
            position: absolute;
            left: 8px;
            bottom: 8px;
            max-width: calc(100% - 16px);
            box-sizing: border-box;
            padding: 3px 8px;
            border-radius: 999px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.55);
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="media-grid"></div>
    <script src="bridge.bundle.js"></script>
</body>
</html>
